repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npx eslint --fix "$@"' --
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx|mjs)$
        exclude: ^frontend/(node_modules|\.next|api/(backend|allauth)\.ts)
      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && npx prettier --write "$@"' --
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx|mjs|json|css|md)$
        exclude: ^frontend/(node_modules|\.next|package-lock\.json)
