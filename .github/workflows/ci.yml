name: CI

on: push

jobs:
  backend-lint:
    name: Backend (${{ matrix.tool.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - name: Ruff
            command: |
              poetry run ruff check .
              poetry run ruff format --check .
          - name: Mypy
            command: poetry run mypy .
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SETTINGS_MODULE: backend.settings
      DJANGO_CONFIGURATION: Local
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "poetry"
          cache-dependency-path: backend/poetry.lock

      - name: Install dependencies
        run: poetry install

      - name: Run ${{ matrix.tool.name }}
        run: ${{ matrix.tool.command }}

  backend-test:
    name: Backend (Pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SETTINGS_MODULE: backend.settings
      DJANGO_CONFIGURATION: Local
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      VALKEY_URL: redis://localhost:6379
    services:
      database:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      cache:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "poetry"
          cache-dependency-path: backend/poetry.lock

      - name: Install dependencies
        run: poetry install

      - name: Run pytest
        run: poetry run pytest

  frontend:
    name: Frontend (${{ matrix.tool.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - name: ESLint
            command: npm run lint
          - name: Typecheck
            command: npx tsc --noEmit
          - name: Build
            command: npm run build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.tool.name }}
        run: ${{ matrix.tool.command }}

  frontend-test:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test -- --run
